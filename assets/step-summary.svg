<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .t { fill: #e6edf3; } .m { fill: #8b949e; } .b { fill: #e6edf3; font-weight: 700; }
      .green { fill: #3fb950; } .code { fill: #79c0ff; }
    </style>
  </defs>
  <rect width="900" height="300" rx="10" fill="#0d1117"/>
  <rect x="20" y="20" width="860" height="260" rx="8" fill="#161b22" stroke="#30363d"/>

  <!-- tab label -->
  <text x="44" y="52" class="m" font-size="12">Actions ▸ Summary</text>
  <text x="44" y="84" class="b" font-size="17">Neurcode — PR Scope Coherence</text>

  <!-- green banner -->
  <rect x="44" y="100" width="812" height="44" rx="6" fill="#0d1117" stroke="#238636"/>
  <text x="64" y="128" font-size="15"><tspan class="green" font-weight="700">✓  Scope coherent — no PR comment posted. This is the expected result.</tspan></text>

  <text x="44" y="174" class="t" font-size="13">Neurcode stays silent on healthy PRs and speaks only when a change's actual blast</text>
  <text x="44" y="194" class="t" font-size="13">radius diverges from what it says it does. It is advisory and never blocks your merge.</text>

  <text x="44" y="228" class="mono" font-size="12"><tspan class="m">Reads as: </tspan><tspan class="code">fix</tspan></text>
  <text x="44" y="248" class="mono" font-size="12"><tspan class="m">Touches:  </tspan><tspan class="t">frontend/appflowy_flutter ×1</tspan></text>
  <text x="44" y="268" class="mono" font-size="12"><tspan class="m">Scope hash: </tspan><tspan class="t">3f1242928530</tspan><tspan class="m"> — re-run on the same commit to reproduce.</tspan></text>
</svg>
