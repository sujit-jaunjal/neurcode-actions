<svg width="900" height="430" viewBox="0 0 900 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .t  { fill: #e6edf3; }
      .m  { fill: #8b949e; }
      .b  { fill: #e6edf3; font-weight: 700; }
      .amber { fill: #d29922; }
      .code { fill: #79c0ff; }
    </style>
  </defs>
  <rect width="900" height="430" rx="10" fill="#0d1117"/>
  <!-- comment card -->
  <rect x="20" y="20" width="860" height="390" rx="8" fill="#161b22" stroke="#30363d"/>
  <!-- header bar -->
  <rect x="20" y="20" width="860" height="46" rx="8" fill="#1c2128"/>
  <rect x="20" y="44" width="860" height="22" fill="#1c2128"/>
  <circle cx="46" cy="43" r="13" fill="#1f6feb"/>
  <path d="M40 43 h12 M46 37 v12" stroke="#cae3ff" stroke-width="2" stroke-linecap="round"/>
  <text x="70" y="48" class="b" font-size="14">neurcode</text>
  <rect x="138" y="35" width="36" height="17" rx="8.5" fill="#21262d" stroke="#30363d"/>
  <text x="156" y="47" class="m" font-size="10" text-anchor="middle">bot</text>
  <text x="188" y="48" class="m" font-size="13">commented · advisory check</text>

  <!-- title -->
  <text x="44" y="100" class="b" font-size="17">Neurcode — PR Scope Coherence</text>

  <!-- verdict -->
  <text x="44" y="135" font-size="15"><tspan class="amber" font-weight="700">⚠  Worth a look</tspan><tspan class="t"> — this fix change spreads across 6 modules, wider than its label suggests.</tspan></text>

  <!-- reads as / touches block -->
  <rect x="44" y="156" width="812" height="120" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="60" y="184" font-size="13"><tspan class="b">Reads as:</tspan><tspan class="t" xml:space="preserve">  </tspan><tspan class="mono code">fix</tspan><tspan class="m" xml:space="preserve">  — “fix: permission control doesn't work when opening the page”</tspan></text>
  <text x="60" y="212" font-size="13"><tspan class="b">Actually touches:</tspan></text>
  <text x="60" y="234" class="mono" font-size="12"><tspan class="m">config ×2 · frontend ×2 · </tspan><tspan class="t" font-weight="700">appflowy_flutter (billing) ×51</tspan><tspan class="m"> ·</tspan></text>
  <text x="60" y="254" class="mono" font-size="12"><tspan class="m">flowy-folder ×3 · flowy-folder-pub ×3 · </tspan><tspan class="amber" font-weight="700">flowy-sqlite (migrations) ×6</tspan><tspan class="m"> · tests ×1</tspan></text>

  <!-- footer -->
  <line x1="44" y1="316" x2="856" y2="316" stroke="#21262d"/>
  <text x="44" y="344" class="mono m" font-size="11">Deterministic · scope `192e7e6f554c` · re-run on this commit to reproduce</text>
  <text x="44" y="374" class="m" font-size="12" font-style="italic">Advisory — never blocks your merge unless a maintainer turns that on.</text>
  <text x="44" y="394" class="m" font-size="12" font-style="italic">Neurcode checks operational boundaries, not code style — it runs alongside your code reviewer.</text>
</svg>
