# Per-PR scope coherence (advisory, sparse).
# Copy to .github/workflows/neurcode.yml in your repo.
name: Neurcode Scope Coherence

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # to post the (rare) advisory comment — nothing else

concurrency:             # never pile up on rapid pushes
  group: neurcode-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history → accurate blast radius
      - uses: sujit-jaunjal/neurcode-actions@v0.2.4
        with:
          oss_mode: 'true'
          github_token: ${{ github.token }}
          comment_on: 'flagged'        # silent on coherent PRs (default). 'always' | 'never' also valid.
          scope_coherence_fail: 'false' # advisory; never blocks. Opt into 'true' only once you trust it.
