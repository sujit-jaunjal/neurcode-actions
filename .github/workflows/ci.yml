# Distribution integrity check. This repo ships a prebuilt bundle (no source),
# so CI validates the artifact is present, well-formed, and wired correctly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate bundle syntax
        run: node --check dist/index.js

      - name: Assert action manifest points at the bundle
        run: |
          set -euo pipefail
          test -f action.yml
          grep -q "main: 'dist/index.js'" action.yml
          test -f dist/index.js
          echo "action.yml → dist/index.js present and well-formed"

      - name: OSS export boundary check
        run: node scripts/oss-export-boundary-check.mjs . --profile=action
