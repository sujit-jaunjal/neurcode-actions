name: Request advisory pilot
description: Request access to the neurcode-actions advisory pilot for your repository.
title: "[Pilot] "
labels: ["pilot-request"]

body:
  - type: markdown
    attributes:
      value: |
        ## Advisory pilot request

        The neurcode-actions pilot installs a single GitHub Actions workflow that accumulates operational memory about your repository over time. It runs silently in the background, interrupts rarely, and never blocks a merge.

        **What the pilot does:**
        - Accumulates repository operational memory across PRs and releases
        - Emits sparse comments on PRs where structural coupling or lifecycle signals are material
        - Produces operational summaries at release cadence
        - Records replay-safe, deterministic structural observations locally

        **What the pilot does not do:**
        - Most PRs will receive no comment. Silence is expected and correct behavior, not a misconfiguration.
        - The Action is advisory-only. It cannot block merges under any circumstances.
        - Blocking behavior is intentionally disabled and cannot be enabled.
        - The pilot is observational. It does not modify your repository or workflow configuration.

        **Coexistence:** The Action coexists with CodeRabbit, SonarCloud, and any existing review or analysis tooling you already run. It does not compete with or duplicate those surfaces.

        **Rollback:** Remove the workflow file. That is the complete rollback procedure. No other cleanup is required.

        **Cost:** There is no cost during the advisory pilot period.

        ---

  - type: input
    id: repo_url
    attributes:
      label: Repository URL
      description: The repository where you would like to install the Action.
      placeholder: "https://github.com/org/repo"
    validations:
      required: true

  - type: dropdown
    id: repo_type
    attributes:
      label: Repository type
      options:
        - "Public (OSS)"
        - "Internal / private"
        - "Internal monorepo"
    validations:
      required: true

  - type: input
    id: primary_languages
    attributes:
      label: Primary language(s)
      description: The main programming languages in this repository.
      placeholder: "e.g. TypeScript, Python, Go"
    validations:
      required: true

  - type: dropdown
    id: repo_size
    attributes:
      label: Approximate repository size
      description: Rough file count or overall codebase scale.
      options:
        - "Small (< 500 files)"
        - "Medium (500 – 5,000 files)"
        - "Large (5,000 – 20,000 files)"
        - "Very large (> 20,000 files)"
    validations:
      required: true

  - type: dropdown
    id: contributor_activity
    attributes:
      label: Contributor activity level
      description: Approximate PR merge cadence.
      options:
        - "Low (< 5 PRs / week)"
        - "Moderate (5 – 20 PRs / week)"
        - "High (20 – 50 PRs / week)"
        - "Very high (> 50 PRs / week)"
    validations:
      required: true

  - type: checkboxes
    id: existing_tooling
    attributes:
      label: Existing review or analysis tooling
      description: Check any tooling already active on this repository. The Action coexists with all of these without configuration changes.
      options:
        - label: CodeRabbit
        - label: SonarCloud / SonarQube
        - label: Custom CI review or lint tooling
        - label: AI-assisted PR workflows (GitHub Copilot, Cursor, Codex, Gemini, etc.)
        - label: None of the above

  - type: dropdown
    id: desired_surfaces
    attributes:
      label: Desired pilot surfaces
      description: Which surfaces would you like active during the pilot? Both can be enabled or disabled independently.
      options:
        - "Both (sparse PR interruption + operational memory)"
        - "Sparse PR interruption only"
        - "Operational memory accumulation only"
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context (optional)
      description: Any constraints, concerns, or context that would help configure the pilot appropriately.
      placeholder: "Air-gapped CI, unusual monorepo layout, preferences around comment frequency, specific concern about a subsystem, etc."
    validations:
      required: false

  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Acknowledgment
      options:
        - label: I understand the pilot is advisory-only and does not block merges.
          required: true
        - label: I understand most PRs will receive no comment. Silence is expected behavior, not an error.
          required: true
        - label: I understand rollback is a single workflow file removal, with no other cleanup required.
          required: true
